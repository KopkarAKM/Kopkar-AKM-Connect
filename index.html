<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Portal Koperasi Adaro Karya Mandiri</title>
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  </style>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-tint": "#3a5f94",
            "inverse-on-surface": "#ebf1ff",
            "on-secondary-fixed": "#00210a",
            "on-secondary-fixed-variant": "#005324",
            "on-primary-fixed-variant": "#1f477b",
            "on-secondary-container": "#007234",
            "on-tertiary": "#ffffff",
            "tertiary": "#1b1f21",
            "on-error-container": "#93000a",
            "primary-fixed-dim": "#a7c8ff",
            "error": "#ba1a1a",
            "on-tertiary-fixed-variant": "#434749",
            "on-tertiary-container": "#999c9e",
            "outline-variant": "#c3c6d1",
            "on-tertiary-fixed": "#181c1e",
            "background": "#f9f9ff",
            "on-error": "#ffffff",
            "secondary-fixed": "#8ef9a4",
            "primary": "#001e40",
            "surface-container-lowest": "#ffffff",
            "secondary-container": "#8bf6a1",
            "surface-container-high": "#dee8ff",
            "secondary": "#006d31",
            "on-surface-variant": "#43474f",
            "surface": "#f9f9ff",
            "secondary-fixed-dim": "#71dc8a",
            "primary-container": "#003366",
            "tertiary-fixed": "#e0e3e5",
            "surface-variant": "#d8e3fa",
            "tertiary-container": "#303436",
            "on-background": "#111c2c",
            "inverse-surface": "#263142",
            "surface-container": "#e7eeff",
            "on-secondary": "#ffffff",
            "on-primary": "#ffffff",
            "error-container": "#ffdad6",
            "tertiary-fixed-dim": "#c4c7c9",
            "on-primary-container": "#799dd6",
            "inverse-primary": "#a7c8ff",
            "surface-container-highest": "#d8e3fa",
            "on-primary-fixed": "#001b3c",
            "surface-bright": "#f9f9ff",
            "on-surface": "#111c2c",
            "surface-container-low": "#f0f3ff",
            "primary-fixed": "#d5e3ff",
            "outline": "#737780",
            "surface-dim": "#cfdaf1"
          },
          spacing: {
            "gutter": "24px",
            "margin-mobile": "16px",
            "xs": "4px",
            "xl": "40px",
            "sm": "8px",
            "base": "8px",
            "lg": "24px",
            "margin-desktop": "48px",
            "md": "16px"
          },
          fontSize: {
            "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
            "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
            "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
            "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
            "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
            "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
            "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
            "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "500" }],
            "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
            "label-md": ["12px", { "lineHeight": "16px", "fontWeight": "500" }]
          }
        }
      }
    }
  </script>

  <!-- React & Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const GAS_URL = "https://script.google.com/macros/s/AKfycbxBMZ6lVxo7H3B5aRaMO26OoiCGNzbZWXIaQ6fXypq8T25kl_2g-hgtSzy33tutXGJ5/exec"; 

    const BottomNav = ({ activeTab, onNavigate }) => {
      return (
        <nav className="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe pt-2 bg-surface-container shadow-[0_-4px_12px_rgba(0,0,0,0.05)] rounded-t-xl">
          <button onClick={() => onNavigate('dashboard')} className={`flex flex-col items-center justify-center px-4 py-1 transition-all ${activeTab === 'home' ? 'bg-secondary-container text-on-secondary-container rounded-full active:scale-90' : 'text-on-surface-variant hover:bg-surface-container-high'}`}>
            <span className="material-symbols-outlined" style={activeTab === 'home' ? {fontVariationSettings: "'FILL' 1"} : {}}>home</span>
            <span className="text-label-md font-label-md">Beranda</span>
          </button>
          <button onClick={() => onNavigate('services')} className={`flex flex-col items-center justify-center px-4 py-1 transition-all ${activeTab === 'services' ? 'bg-secondary-container text-on-secondary-container rounded-full active:scale-90' : 'text-on-surface-variant hover:bg-surface-container-high'}`}>
            <span className="material-symbols-outlined" style={activeTab === 'services' ? {fontVariationSettings: "'FILL' 1"} : {}}>apps</span>
            <span className="text-label-md font-label-md">Layanan</span>
          </button>
          <button onClick={() => onNavigate('edit-profile')} className={`flex flex-col items-center justify-center px-4 py-1 transition-all ${activeTab === 'profile' ? 'bg-secondary-container text-on-secondary-container rounded-full active:scale-90' : 'text-on-surface-variant hover:bg-surface-container-high'}`}>
            <span className="material-symbols-outlined" style={activeTab === 'profile' ? {fontVariationSettings: "'FILL' 1"} : {}}>person</span>
            <span className="text-label-md font-label-md">Profil</span>
          </button>
          <button className="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-high transition-all">
            <span className="material-symbols-outlined">settings</span>
            <span className="text-label-md font-label-md">Pengaturan</span>
          </button>
        </nav>
      );
    };

    const LoginScreen = ({ onLoginSuccess }) => {
      const [nama, setNama] = useState('');
      const [password, setPassword] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');

      const handleLogin = async (e) => {
        e.preventDefault();
        setIsLoading(true);
        setErrorMsg('');

        try {
          if (nama.toLowerCase().trim() === 'admin' && password.trim() === 'admin') {
            onLoginSuccess({ Nama: 'Admin Uji Coba', NoAnggota: '12345', TempatTanggalLahir: 'Jakarta, 1 Jan 1990', Site: 'KM 73' });
            return;
          }

          const response = await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'login', nama, password })
          });
          
          const result = await response.json();
          
          if (result.status === 'success') {
            onLoginSuccess(result.data);
          } else {
            setErrorMsg(result.message);
          }
        } catch (err) {
          setErrorMsg('Koneksi gagal. Pastikan URL Google Script sudah benar.');
        } finally {
          setIsLoading(false);
        }
      };

      return (
        <div className="text-on-background font-body-md min-h-screen flex flex-col justify-center items-center p-margin-mobile w-full bg-surface">
          <main className="w-full max-w-[440px] flex flex-col gap-xl z-10">
            <header className="flex flex-col items-center gap-md text-center">
              <div className="w-24 h-24 flex items-center justify-center mb-2">
                <img src="https://i.ibb.co.com/WvTwLMn5/image-1.png" alt="Logo Koperasi Adaro" className="w-full h-full object-contain drop-shadow-md" />
              </div>
              <div className="space-y-sm">
                <h1 className="font-headline-lg-mobile text-primary tracking-tight">Adaro Karya Mandiri</h1>
                <p className="text-body-md text-on-surface-variant">Portal Keanggotaan Koperasi Karyawan</p>
              </div>
            </header>

            <section className="bg-surface-container-lowest rounded-xl border border-outline-variant shadow-[0_4px_12px_rgba(0,30,64,0.05)] p-lg">
              <form className="flex flex-col gap-lg" onSubmit={handleLogin}>
                <div className="flex flex-col gap-xs">
                  <label className="font-label-lg text-on-surface ml-1">Nama Pengguna</label>
                  <div className="relative flex items-center">
                    <span className="material-symbols-outlined absolute left-4 text-outline">person</span>
                    <input value={nama} onChange={(e)=>setNama(e.target.value)} className="w-full h-[48px] pl-12 pr-4 bg-surface rounded-lg border border-outline-variant text-on-surface focus:ring-2 focus:ring-primary-container focus:border-primary transition-all outline-none" placeholder="Masukkan Nama Anda" required type="text" />
                  </div>
                </div>

                <div className="flex flex-col gap-xs">
                  <div className="flex justify-between items-center px-1">
                    <label className="font-label-lg text-on-surface">Kata Sandi (No Anggota)</label>
                  </div>
                  <div className="relative flex items-center">
                    <span className="material-symbols-outlined absolute left-4 text-outline">lock</span>
                    <input value={password} onChange={(e)=>setPassword(e.target.value)} className="w-full h-[48px] pl-12 pr-12 bg-surface rounded-lg border border-outline-variant text-on-surface focus:ring-2 focus:ring-primary-container focus:border-primary transition-all outline-none" placeholder="Masukkan No Anggota Koperasi" required type="password" />
                  </div>
                </div>

                {errorMsg && <div className="text-error font-body-sm text-center bg-error-container/20 p-2 rounded">{errorMsg}</div>}

                <div className="bg-primary-fixed/30 border border-primary-fixed-dim/50 p-3 rounded-lg flex items-start gap-2">
                  <span className="material-symbols-outlined text-primary text-[18px] mt-0.5">info</span>
                  <p className="text-label-sm text-on-surface-variant">
                    Masuk gunakan Nama dan No Anggota Anda sesuai data koperasi. Untuk uji coba ketik admin di kedua kolom.
                  </p>
                </div>

                <button disabled={isLoading} className="w-full h-[48px] bg-primary text-white font-label-lg rounded-lg shadow-sm hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
                  {isLoading ? 'Memproses...' : 'Masuk'}
                  {!isLoading && <span className="material-symbols-outlined text-[20px]">login</span>}
                </button>
              </form>
            </section>
          </main>
        </div>
      );
    };

    const DashboardScreen = ({ onNavigate, userData }) => {
      return (
        <div className="bg-surface text-on-surface min-h-screen flex flex-col w-full font-body-md pb-24">
          <header className="flex justify-between items-center w-full px-margin-mobile py-2 sticky top-0 z-50 bg-surface border-b border-outline-variant shadow-sm">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center overflow-hidden border border-outline-variant shadow-inner">
                {userData?.Foto ? (
                  <img src={userData.Foto} alt="Profile" className="w-full h-full object-cover" />
                ) : (
                  <span className="material-symbols-outlined text-white">person</span>
                )}
              </div>
              <div>
                <h1 className="text-headline-sm-mobile font-bold text-primary">Adaro Karya Mandiri</h1>
                <p className="text-label-md text-on-surface-variant">Halo, {userData?.Nama || 'Anggota'}</p>
              </div>
            </div>
          </header>

          <main className="flex-grow px-margin-mobile pt-lg max-w-screen-xl mx-auto w-full">
            <div className="grid grid-cols-1 gap-base">
              <section 
                className="rounded-2xl text-white shadow-xl relative overflow-hidden bg-cover bg-top flex flex-col items-center mx-auto w-full max-w-[300px] aspect-[2/3]"
                style={{ backgroundImage: "url('https://i.ibb.co.com/8LnVP8vp/1.png')" }}
              >
                <div className="absolute inset-0 bg-gradient-to-b from-transparent via-primary/50 to-primary/95 z-0"></div>

                <div className="relative z-10 w-32 h-32 mt-[145px] bg-surface-container-lowest rounded-full border-2 border-white/50 overflow-hidden shrink-0 flex items-center justify-center shadow-lg bg-white">
                  {userData?.Foto ? (
                    <img src={userData.Foto} alt="Foto Profil" className="w-full h-full object-cover" />
                  ) : (
                    <span className="material-symbols-outlined text-6xl text-outline">person</span>
                  )}
                </div>

                <div className="mt-auto relative z-10 flex flex-col gap-3 w-full px-4 pb-6 text-center">
                  <div className="w-full mb-2">
                    <h3 className="font-bold text-[10px] tracking-widest text-secondary-fixed opacity-90 uppercase mb-0.5 drop-shadow-md">Koperasi Karyawan</h3>
                    <h2 className="font-bold text-lg leading-tight tracking-wide drop-shadow-md">Adaro Karya Mandiri</h2>
                  </div>

                  <div>
                    <p className="text-[10px] text-primary-fixed-dim uppercase tracking-wider mb-0.5">Nama Lengkap</p>
                    <p className="font-bold text-xl leading-tight truncate drop-shadow-md">{userData?.Nama || 'Nama Belum Diisi'}</p>
                  </div>
                  <div className="flex justify-between gap-2 border-t border-white/30 pt-3 mt-1">
                    <div className="flex-1 text-center">
                      <p className="text-[10px] text-primary-fixed-dim uppercase tracking-wider mb-0.5">No. Anggota</p>
                      <p className="font-mono text-sm font-semibold tracking-wider drop-shadow-md">{userData?.NoAnggota || '-'}</p>
                    </div>
                    <div className="w-[1px] bg-white/30"></div>
                    <div className="flex-1 text-center">
                      <p className="text-[10px] text-primary-fixed-dim uppercase tracking-wider mb-0.5">Site</p>
                      <p className="font-semibold text-sm drop-shadow-md">{userData?.Site || '-'}</p>
                    </div>
                  </div>
                </div>
              </section>

              <div className="grid grid-cols-2 gap-base mt-sm">
                <button onClick={() => onNavigate('edit-profile')} className="flex flex-col items-center justify-center gap-3 p-lg bg-surface-container-lowest rounded-xl border border-outline-variant/30 hover:bg-surface-container-low transition-all shadow-sm">
                  <div className="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary">
                    <span className="material-symbols-outlined">edit_square</span>
                  </div>
                  <span className="text-label-lg font-label-lg text-on-surface">Update Profil</span>
                </button>
                <button onClick={() => onNavigate('services')} className="flex items-center justify-between gap-3 p-lg bg-secondary-container text-on-secondary-container rounded-xl border border-secondary/20 hover:bg-secondary-container/80 transition-all shadow-sm">
                  <div className="flex items-center gap-3">
                    <div className="w-12 h-12 rounded-full bg-on-secondary-container/10 flex items-center justify-center">
                      <span className="material-symbols-outlined">apps</span>
                    </div>
                    <div className="text-left">
                      <span className="text-label-lg font-label-lg block leading-tight">Layanan</span>
                    </div>
                  </div>
                </button>
              </div>
            </div>
          </main>
          <BottomNav activeTab="home" onNavigate={onNavigate} />
        </div>
      );
    };

    const EditProfileScreen = ({ onNavigate, onSave, userData, setUserData }) => {
      const [formData, setFormData] = useState(userData || {});
      const [newPassword, setNewPassword] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [passLoading, setPassLoading] = useState(false);
      
      const [statusMsg, setStatusMsg] = useState('');
      const [passMsg, setPassMsg] = useState('');
      const [uploadMsg, setUploadMsg] = useState('');

      const handleChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleUpdateData = async (e) => {
        e.preventDefault();
        setIsLoading(true);
        setStatusMsg('');
        try {
          if (formData.Nama === 'Admin Uji Coba') {
            setUserData(formData);
            onSave();
            return;
          }

          const response = await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'updateProfile', NoAnggota: userData.NoAnggota, userData: formData })
          });
          const result = await response.json();
          if (result.status === 'success') {
            setUserData(formData);
            onSave();
          } else {
            setStatusMsg(result.message);
          }
        } catch (err) {
          setStatusMsg("Gagal menyimpan data. Periksa koneksi Anda.");
        } finally {
          setIsLoading(false);
        }
      };

      const handleChangePassword = async (e) => {
        e.preventDefault();
        if(!newPassword) return;
        setPassLoading(true);
        setPassMsg('');
        try {
          if (formData.Nama === 'Admin Uji Coba') {
            setPassMsg("Sandi berhasil diubah di mode uji coba.");
            setNewPassword('');
            setPassLoading(false);
            return;
          }

          const response = await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'changePassword', NoAnggota: userData.NoAnggota, newPassword: newPassword })
          });
          const result = await response.json();
          if (result.status === 'success') {
            setPassMsg("Kata sandi berhasil diganti.");
            setNewPassword('');
          } else {
            setPassMsg("Gagal: " + result.message);
          }
        } catch (err) {
          setPassMsg("Gagal mengganti sandi. Periksa koneksi Anda.");
        } finally {
          setPassLoading(false);
        }
      };

      const handleFileUpload = (e, fileType) => {
        const file = e.target.files[0];
        if (!file) return;

        if (formData.Nama === 'Admin Uji Coba') {
            const dummyUrl = "https://i.ibb.co/L5QZpMg/dummy-profile.png"; 
            setFormData(prev => ({...prev, [fileType]: dummyUrl}));
            setUserData(prev => ({...prev, [fileType]: dummyUrl}));
            setUploadMsg(`Mode Uji Coba: Gambar simulasi berhasil dimuat.`);
            return;
        }

        setUploadMsg(`Sedang mengecilkan ukuran dan mengunggah ${fileType}...`);
        
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = async () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800;
            const MAX_HEIGHT = 800;
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > MAX_WIDTH) {
                height *= MAX_WIDTH / width;
                width = MAX_WIDTH;
              }
            } else {
              if (height > MAX_HEIGHT) {
                width *= MAX_HEIGHT / height;
                height = MAX_HEIGHT;
              }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            const base64Compressed = canvas.toDataURL('image/jpeg', 0.7);
            const base64Clean = base64Compressed.split(',')[1];

            try {
              const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                  action: 'uploadFile',
                  NoAnggota: userData.NoAnggota,
                  fileType: fileType,
                  base64: base64Clean,
                  mimeType: 'image/jpeg',
                  fileName: file.name
                })
              });
              const result = await response.json();
              if (result.status === 'success') {
                setFormData(prev => ({...prev, [fileType]: result.url}));
                setUserData(prev => ({...prev, [fileType]: result.url}));
                setUploadMsg(`${fileType} berhasil disimpan.`);
              } else {
                setUploadMsg(`Gagal mengunggah: ${result.message}`);
                alert(`Pesan dari Server: ${result.message}`);
              }
            } catch (err) {
              setUploadMsg(`Kesalahan jaringan saat mengunggah ${fileType}.`);
              alert(`Error Koneksi: ${err.message}`);
            }
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      return (
        <div className="bg-background text-on-surface font-body-md min-h-screen pb-24 w-full">
          <header className="flex justify-between items-center w-full px-margin-mobile py-2 sticky top-0 z-50 bg-surface border-b border-outline-variant shadow-sm">
            <div className="flex items-center gap-3">
              <button onClick={() => onNavigate('dashboard')} className="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors">
                <span className="material-symbols-outlined text-primary">arrow_back</span>
              </button>
              <h1 className="text-headline-sm-mobile font-bold text-primary">Edit Profil</h1>
            </div>
          </header>

          <main className="max-w-xl mx-auto px-margin-mobile pt-lg flex flex-col gap-lg">
            {uploadMsg && <div className="bg-surface-variant p-3 rounded text-on-surface-variant text-center font-body-sm">{uploadMsg}</div>}
            
            <form className="flex flex-col gap-xl" onSubmit={handleUpdateData}>
              <section className="bg-white rounded-xl p-md shadow-sm border border-outline-variant/30">
                <div className="flex items-center gap-base mb-md border-b border-outline-variant/50 pb-sm">
                  <span className="material-symbols-outlined text-primary">person</span>
                  <h3 className="text-label-lg text-primary">Data Pribadi</h3>
                </div>
                <div className="flex flex-col gap-md">
                  <div className="flex flex-col gap-xs">
                    <label className="text-label-md text-on-surface-variant">Nama Sesuai KTP</label>
                    <input name="Nama" value={formData.Nama || ''} onChange={handleChange} className="w-full h-[44px] px-md rounded-lg border border-outline-variant bg-surface-container-low" type="text" />
                  </div>
                  <div className="flex flex-col gap-xs">
                    <label className="text-label-md text-on-surface-variant">Site</label>
                    <select name="Site" value={formData.Site || ''} onChange={handleChange} className="w-full h-[44px] px-md rounded-lg border border-outline-variant bg-surface-container-low">
                      <option value="">Pilih Site</option>
                      <option value="KM 73">KM 73</option>
                      <option value="KELANIS">KELANIS</option>
                      <option value="DAHAI">DAHAI</option>
                      <option value="ANGGOTA LUAR BIASA">ANGGOTA LUAR BIASA</option>
                      <option value="PT MBK">PT MBK</option>
                      <option value="BRO">BRO</option>
                      <option value="YABN">YABN</option>
                    </select>
                  </div>
                  <div className="flex flex-col gap-xs">
                    <label className="text-label-md text-on-surface-variant">Tempat, Tanggal Lahir</label>
                    <input name="TempatTanggalLahir" value={formData.TempatTanggalLahir || ''} onChange={handleChange} className="w-full h-[44px] px-md rounded-lg border border-outline-variant bg-surface-container-low" type="text" />
                  </div>
                  <div className="flex flex-col gap-xs">
                    <label className="text-label-md text-on-surface-variant">No KTP</label>
                    <input name="NoKTP" value={formData.NoKTP || ''} onChange={handleChange} className="w-full h-[44px] px-md rounded-lg border border-outline-variant bg-surface-container-low" type="text" />
                  </div>
                  <div className="flex flex-col gap-xs">
                    <label className="text-label-md text-on-surface-variant">NPWP</label>
                    <input name="NPWP" value={formData.NPWP || ''} onChange={handleChange} className="w-full h-[44px] px-md rounded-lg border border-outline-variant bg-surface-container-low" type="text" />
                  </div>
                  <div className="flex flex-col gap-xs">
                    <label className="text-label-md text-on-surface-variant">Email</label>
                    <input name="Email" value={formData.Email || ''} onChange={handleChange} className="w-full h-[44px] px-md rounded-lg border border-outline-variant bg-surface-container-low" type="email" />
                  </div>
                  <div className="flex flex-col gap-xs">
                    <label className="text-label-md text-on-surface-variant">No. Handphone (WhatsApp)</label>
                    <input name="NoHP" value={formData.NoHP || ''} onChange={handleChange} className="w-full h-[44px] px-md rounded-lg border border-outline-variant bg-surface-container-low" type="tel" />
                  </div>
                  <div className="flex flex-col gap-xs">
                    <label className="text-label-md text-on-surface-variant">Alamat Domisili</label>
                    <textarea name="Alamat" value={formData.Alamat || ''} onChange={handleChange} className="w-full p-md rounded-lg border border-outline-variant bg-surface-container-low" rows="3" />
                  </div>
                </div>
              </section>

              <section className="bg-white rounded-xl p-md shadow-sm border border-outline-variant/30">
                <div className="flex items-center gap-base mb-md border-b border-outline-variant/50 pb-sm">
                  <span className="material-symbols-outlined text-primary">account_balance</span>
                  <h3 className="text-label-lg text-primary">Data Rekening</h3>
                </div>
                <div className="flex flex-col gap-md">
                  <div className="flex flex-col gap-xs">
                    <label className="text-label-md text-on-surface-variant">Nama Bank</label>
                    <input name="NamaBank" value={formData.NamaBank || ''} onChange={handleChange} className="w-full h-[44px] px-md rounded-lg border border-outline-variant bg-surface-container-low" type="text" />
                  </div>
                  <div className="flex flex-col gap-xs">
                    <label className="text-label-md text-on-surface-variant">No. Rekening</label>
                    <input name="NoRekening" value={formData.NoRekening || ''} onChange={handleChange} className="w-full h-[44px] px-md rounded-lg border border-outline-variant bg-surface-container-low" type="text" />
                  </div>
                </div>
              </section>

              <section className="bg-white rounded-xl p-md shadow-sm border border-outline-variant/30">
                <div className="flex items-center gap-base mb-md border-b border-outline-variant/50 pb-sm">
                  <span className="material-symbols-outlined text-primary">description</span>
                  <h3 className="text-label-lg text-primary">Dokumen</h3>
                </div>
                <div className="flex flex-col gap-md">
                  <div className="flex flex-col gap-xs">
                    <label className="text-label-md text-on-surface-variant">Unggah Foto Profil</label>
                    <input type="file" onChange={(e) => handleFileUpload(e, 'Foto')} className="w-full file:bg-primary file:text-white file:border-none file:px-3 file:py-1 file:rounded-md file:mr-2 cursor-pointer text-body-sm text-on-surface-variant" accept="image/*" />
                    {formData.Foto && <a href={formData.Foto} target="_blank" rel="noreferrer" className="text-primary font-label-md underline mt-1">Lihat Foto Saat Ini</a>}
                  </div>
                  <div className="flex flex-col gap-xs mt-2">
                    <label className="text-label-md text-on-surface-variant">Unggah KTP</label>
                    <input type="file" onChange={(e) => handleFileUpload(e, 'KTP')} className="w-full file:bg-primary file:text-white file:border-none file:px-3 file:py-1 file:rounded-md file:mr-2 cursor-pointer text-body-sm text-on-surface-variant" accept="image/*" />
                    {formData.KTP && <a href={formData.KTP} target="_blank" rel="noreferrer" className="text-primary font-label-md underline mt-1">Lihat KTP Saat Ini</a>}
                  </div>
                </div>
              </section>

              {statusMsg && <div className="text-error font-body-sm text-center">{statusMsg}</div>}

              <button disabled={isLoading} className="w-full h-12 bg-primary text-on-primary rounded-full font-label-lg shadow-md hover:opacity-90 transition-all" type="submit">
                {isLoading ? 'Menyimpan...' : 'Simpan Profil'}
              </button>
            </form>

            <form className="bg-error-container/20 rounded-xl p-md shadow-sm border border-error/30 mt-4" onSubmit={handleChangePassword}>
              <div className="flex items-center gap-base mb-md border-b border-error/20 pb-sm">
                <span className="material-symbols-outlined text-error">lock_reset</span>
                <h3 className="text-label-lg text-error">Ganti Sandi Akun</h3>
              </div>
              <div className="flex flex-col gap-md">
                <div className="flex flex-col gap-xs">
                  <label className="text-label-md text-on-surface-variant">Kata Sandi Baru</label>
                  <input value={newPassword} onChange={(e)=>setNewPassword(e.target.value)} className="w-full h-[44px] px-md rounded-lg border border-outline-variant bg-white" placeholder="Masukkan sandi baru" required type="password" />
                </div>
                {passMsg && <div className="text-primary font-body-sm">{passMsg}</div>}
                <button disabled={passLoading} className="w-full h-10 bg-error text-white rounded-lg font-label-lg shadow-sm hover:opacity-90 transition-all" type="submit">
                  {passLoading ? 'Memproses...' : 'Ubah Sandi Sekarang'}
                </button>
              </div>
            </form>
          </main>
          <BottomNav activeTab="profile" onNavigate={onNavigate} />
        </div>
      );
    };

    const SuccessScreen = ({ onNavigate }) => {
      return (
        <div className="bg-surface text-on-surface font-body-md min-h-screen flex flex-col w-full">
          <main className="flex-grow flex items-center justify-center px-margin-mobile py-xl">
            <div className="w-full max-w-md text-center">
              <div className="mb-lg flex justify-center">
                <div className="relative">
                  <div className="absolute inset-0 bg-secondary-container rounded-full scale-150 opacity-20 animate-pulse"></div>
                  <div className="w-24 h-24 bg-secondary-container text-on-secondary-container rounded-full flex items-center justify-center relative z-10">
                    <span className="material-symbols-outlined !text-[56px]" style={{fontVariationSettings: "'FILL' 1"}}>check_circle</span>
                  </div>
                </div>
              </div>
              <h2 className="text-headline-lg-mobile text-primary mb-2">Data Berhasil Disimpan</h2>
              <p className="text-body-md text-on-surface-variant mb-xl">Perubahan profil Anda telah berhasil dicatat ke sistem pusat Koperasi Adaro.</p>
              <button onClick={() => onNavigate('dashboard')} className="w-full bg-primary text-on-primary font-label-lg h-[44px] rounded-lg shadow-sm">Kembali ke Beranda</button>
            </div>
          </main>
          <BottomNav activeTab="profile" onNavigate={onNavigate} />
        </div>
      );
    };

    const ServicesScreen = ({ onNavigate }) => {
      return (
        <div className="bg-background text-on-background min-h-screen pb-24 font-body-md w-full">
          <header className="bg-surface border-b border-outline-variant shadow-sm flex justify-between items-center w-full px-margin-mobile py-2 sticky top-0 z-50">
            <h1 className="text-headline-sm-mobile font-bold text-primary">Layanan Koperasi</h1>
          </header>
          <main className="max-w-7xl mx-auto px-4 pt-8">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div className="bg-white border border-outline-variant p-6 rounded-xl shadow-sm">
                <div className="w-12 h-12 bg-primary-fixed text-primary rounded-lg flex items-center justify-center mb-4"><span className="material-symbols-outlined text-2xl">payments</span></div>
                <h4 className="font-headline-sm text-primary mb-2">Pengajuan Pinjaman</h4>
                <p className="font-body-sm text-on-surface-variant mb-6">Ajukan dana untuk kebutuhan mendesak.</p>
                <button className="w-full py-3 rounded-lg bg-surface-container-high text-primary font-label-lg">Buka Form</button>
              </div>
            </div>
          </main>
          <BottomNav activeTab="services" onNavigate={onNavigate} />
        </div>
      );
    };

    function App() {
      const [currentScreen, setCurrentScreen] = useState('login');
      const [userData, setUserData] = useState(null);

      return (
        <div className="w-full flex justify-center bg-gray-100 min-h-screen">
          <div className="w-full max-w-[480px] bg-white relative shadow-2xl overflow-x-hidden">
            {currentScreen === 'login' && <LoginScreen onLoginSuccess={(data) => { setUserData(data); setCurrentScreen('dashboard'); }} />}
            {currentScreen === 'dashboard' && <DashboardScreen userData={userData} onNavigate={setCurrentScreen} />}
            {currentScreen === 'edit-profile' && <EditProfileScreen userData={userData} setUserData={setUserData} onNavigate={setCurrentScreen} onSave={() => setCurrentScreen('success')} />}
            {currentScreen === 'success' && <SuccessScreen onNavigate={setCurrentScreen} />}
            {currentScreen === 'services' && <ServicesScreen onNavigate={setCurrentScreen} />}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
